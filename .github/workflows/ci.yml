name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & TypeCheck & Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # BullMQ / ioredis 相关测试需要真实 Redis，否则 ECONNREFUSED 6379 全挂
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 关键：每个步骤都用 if: always() (除 install/checkout)，避免 Lint 失败遮蔽 Test 阶段。
      # 任一步骤失败仍会让整个 job 失败，但反馈信息一次跑完，不会"挂在 Lint 就退出"。
      - name: Lint (Biome)
        if: always()
        run: pnpm lint

      - name: TypeCheck
        if: always()
        run: pnpm typecheck

      - name: Unit Tests
        if: always()
        run: pnpm test

      # @relight/mac 是 SwiftUI 工程，build 走 xcodebuild，只能在 macOS 跑
      # Linux runner 上用 turbo --filter 排除
      - name: Build
        if: always()
        run: pnpm exec turbo build --filter='!@relight/mac'

      - name: Bundle Size Check
        if: always()
        run: pnpm test:size
